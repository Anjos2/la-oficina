# Recursos del proyecto {NOMBRE_PROYECTO}
# Herramientas, servicios, cuentas, ubicaciones y activos que el proyecto usa.
# Las CREDENCIALES no van aquí — van como punteros en referencias.md.

herramientas:
  # Software, plataformas o servicios con los que se trabaja.
  - nombre: "{ej: hoja de cálculo compartida / CRM / editor / plataforma X}"
    proposito: "{para qué se usa en este proyecto}"
    ubicacion: "{URL, ruta o dónde se encuentra}"
    criticidad: "{alta|media|baja}"

cuentas_y_servicios:
  # Cuentas de terceros involucradas (correo, redes, APIs, almacenamiento...).
  - servicio: "{nombre}"
    uso: "{para qué}"
    acceso: "ver referencias.md → {entrada}"

ubicaciones_de_trabajo:
  # Dónde viven las cosas: carpetas, repositorios, drives, servidores si los hay.
  - que: "{ej: carpeta de entregables / repositorio / drive}"
    donde: "{ruta o URL}"
    notas: "{quién puede tocarlo, convenciones}"

activos:
  # Material propio del proyecto: plantillas, marcas, bases de datos, inventarios...
  - activo: "{nombre}"
    donde: "{ubicación}"
    notas: "{estado, versión, dueño}"
